services:
  postgres:
    image: postgres:16-alpine
    container_name: retail-postgres
    environment:
      POSTGRES_USER: retail
      POSTGRES_PASSWORD: retail123
      POSTGRES_DB: retail_media
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail -d retail_media"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: retail-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.14
    container_name: retail-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.14
    container_name: retail-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  api:
    build:
      context: .
      target: api
    container_name: retail-api
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=retail_media;Username=retail;Password=retail123"
      Redis__ConnectionString: "redis:6379"
      Kafka__BootstrapServers: "kafka:9092"

  processor:
    build:
      context: .
      target: processor
    container_name: retail-processor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=retail_media;Username=retail;Password=retail123"
      Redis__ConnectionString: "redis:6379"
      Kafka__BootstrapServers: "kafka:9092"

  collector:
    build:
      context: .
      target: collector
    container_name: retail-collector
    ports:
      - "5001:8080"
    depends_on:
      kafka:
        condition: service_started
    environment:
      Kafka__BootstrapServers: "kafka:9092"

volumes:
  pgdata:
